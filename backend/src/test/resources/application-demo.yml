spring:
  datasource:
    url: jdbc:h2:mem:auto_grading;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

grading:
  execution-timeout-seconds: 5
  max-source-length-chars: 30000
  max-output-chars: 12000

ai:
  enabled: true
