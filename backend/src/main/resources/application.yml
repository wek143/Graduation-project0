spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/graduation_assignment_autograding_isolated?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:143682}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

grading:
  execution-timeout-seconds: 5
  max-source-length-chars: 30000
  max-output-chars: 12000
  judge-pool:
    core-size: 2
    max-size: 4
    queue-capacity: 200

auth:
  token-expiration-hours: 12
  token-cleanup-interval-ms: 600000

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

app:
  startup:
    open-browser: false
    path: /#/login

ai:
  enabled: ${AI_ENABLED:true}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:20}
  max-source-code-chars: ${AI_MAX_SOURCE_CODE_CHARS:8000}
