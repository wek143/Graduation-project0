spring:
  datasource:
    url: jdbc:h2:file:./data/auto_grading_demo;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
    baseline-version: 0
  h2:
    console:
      enabled: true

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

grading:
  execution-timeout-seconds: 5
  max-source-length-chars: 30000
  max-output-chars: 12000

ai:
  enabled: true
